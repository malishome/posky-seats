<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店內即時座位狀態 v6.5</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f2f2f7; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 850px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); position: relative; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 5px; }
        .deco-img { width: 90px; height: 120px; object-fit: cover; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .title-area { flex: 1; text-align: center; }
        h1 { color: #1c1c1e; font-size: 22px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 16px; margin-top: 8px; }
        .available-status { background-color: #e8f5e9; color: #2e7d32; }
        .full-status { background-color: #ffebee; color: #c62828; }
        
        .legend { display: flex; justify-content: center; gap: 12px; margin: 15px 0; font-size: 13px; color: #555; font-weight: 600; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .box { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.1); }
        .box.available { background-color: #9e9e9e; }
        .box.occupied { background-color: #4caf50; }
        .box.half { background: linear-gradient(90deg, #9e9e9e 50%, #4caf50 50%); }

        .grid-container { width: 100%; overflow-x: auto; background: #fafafa; border-radius: 15px; padding: 15px; border: 1px solid #eee; margin-top: 10px; }
        .table-grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 85px); gap: 12px; min-width: 580px; }
        .table-item { border-radius: 8px; color: white; font-weight: bold; font-size: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; cursor: default; }
        .table-item:hover { transform: scale(1.02); }
        
        .available { background-color: #9e9e9e; }
        .occupied { background-color: #4caf50; }
        .half-occupied { background: linear-gradient(90deg, #9e9e9e 50%, #4caf50 50%); }

        .footer { margin-top: 15px; font-size: 11px; color: #8e8e93; line-height: 1.5; }
        .live-dot { width: 8px; height: 8px; background-color: #ff3b30; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        #sync-status { font-weight: bold; }
        .source-tag { font-size: 9px; padding: 2px 6px; border-radius: 10px; margin-left: 5px; vertical-align: middle; }
        .tag-direct { background: #e3f2fd; color: #007aff; }
        .tag-cloud { background: #fff3e0; color: #ff9500; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://github.com/malishome/posky-seats/raw/main/images/cat-left.jpg" class="deco-img">
            <div class="title-area">
                <h1><span class="live-dot"></span> 店內即時座位 <span id="ver" style="font-size: 10px; opacity: 0.3;">v6.5</span></h1>
                <div id="main-status" class="status-badge available-status">連線中...</div>
            </div>
            <img src="https://github.com/malishome/posky-seats/raw/main/images/cat-right.jpg" class="deco-img">
        </div>

        <div class="legend">
            <div class="legend-item"><div class="box available"></div> 灰色：空位</div>
            <div class="legend-item"><div class="box occupied"></div> 綠色：使用中</div>
            <div class="legend-item"><div class="box half"></div> 灰綠：可併桌 (僅大桌)</div>
        </div>

        <div class="grid-container">
            <div class="table-grid" id="tables"></div>
        </div>

        <div class="footer">
            <div id="update-time">最後同步：載入中...</div>
            <div id="sync-status">📡 正在建立數據連結...</div>
            <div style="margin-top: 5px; opacity: 0.6;">(系統每 15 秒暴力強制刷新，請放心使用)</div>
            <button onclick="location.reload(true)" style="margin-top:10px; padding: 5px 15px; border-radius: 10px; border: 1px solid #ddd; background: white; font-size: 12px; color: #666;">強制清空快取</button>
        </div>
    </div>

    <script>
        const REPO_API = 'https://api.github.com/repos/malishome/posky-seats/commits/main';
        const TUNNEL_FILE = 'https://raw.githubusercontent.com/malishome/posky-seats/main/tunnel.json';
        let apiBase = '';

        function render(data, source) {
            try {
                if (!data || !data.details) return;
                const statusBadge = document.getElementById('main-status');
                const availableCount = data.availableTables || 0;
                statusBadge.innerText = availableCount > 0 ? `尚有空位 (${availableCount} 席)` : '目前客滿';
                statusBadge.className = 'status-badge ' + (availableCount > 0 ? 'available-status' : 'full-status');

                const grid = document.getElementById('tables');
                grid.innerHTML = '';
                
                const sorted = data.details.sort((a,b) => (a.row - b.row) || (a.col - b.col));
                
                sorted.forEach(t => {
                    const div = document.createElement('div');
                    div.className = `table-item ${t.status}`;
                    div.innerHTML = `<span>${t.name}</span>`;
                    if (t.row) {
                        div.style.gridRow = t.row;
                        div.style.gridColumn = t.col;
                    }
                    grid.appendChild(div);
                });
                
                const sourceTag = source === 'direct' ? '<span class="source-tag tag-direct">直連</span>' : '<span class="source-tag tag-cloud">雲端</span>';
                document.getElementById('update-time').innerHTML = `最後同步：${data.lastUpdated || '未知'} ${sourceTag}`;
            } catch (e) {
                console.error("Render error:", e);
            }
        }

        async function refresh() {
            const cacheBuster = `?t=${Date.now()}`;
            
            try {
                const res = await fetch(TUNNEL_FILE + cacheBuster, { cache: 'no-store' });
                const config = await res.json();
                apiBase = config.url;
                document.getElementById('sync-status').innerText = '✅ 連結穩定';
                document.getElementById('sync-status').style.color = '#007aff';
            } catch (e) {
                document.getElementById('sync-status').innerText = '⚠️ 雲端模式';
            }
            
            let success = false;
            if (apiBase) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);
                    const res = await fetch(`${apiBase}/api/seats${cacheBuster}`, { 
                        headers: { 'Bypass-Tunnel-Reminder': 'true' },
                        cache: 'no-store',
                        signal: controller.signal
                    });
                    const data = await res.json();
                    if (data && data.details) {
                        render(data, 'direct');
                        success = true;
                    }
                    clearTimeout(timeoutId);
                } catch (e) {}
            }

            if (!success) {
                try {
                    const commitRes = await fetch(REPO_API + cacheBuster, { cache: 'no-store' });
                    const commitData = await commitRes.json();
                    const sha = commitData.sha;
                    const dataUrl = `https://raw.githubusercontent.com/malishome/posky-seats/${sha}/seatData.json`;
                    const dataRes = await fetch(dataUrl);
                    const data = await dataRes.json();
                    render(data, 'cloud');
                } catch (err) {
                    console.error("Cloud fetch failed.");
                }
            }
        }

        refresh();
        setInterval(refresh, 15000);
    </script>
</body>
</html>
