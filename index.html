<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店內即時座位狀態</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f2f2f7; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); position: relative; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .deco-img { width: 100px; height: 130px; object-fit: cover; border-radius: 12px; }
        h1 { color: #1c1c1e; font-size: 22px; margin: 0; }
        .status-badge { display: inline-block; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .available-status { background-color: #e8f5e9; color: #2e7d32; }
        .full-status { background-color: #ffebee; color: #c62828; }
        
        /* 狀態說明圖例 */
        .legend { display: flex; justify-content: center; gap: 15px; margin: 15px 0; font-size: 13px; color: #666; font-weight: 600; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .box { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.05); }
        .box.available { background-color: #9e9e9e; }
        .box.occupied { background-color: #4caf50; }
        .box.half { background: linear-gradient(90deg, #9e9e9e 50%, #4caf50 50%); }

        /* 座位網格 */
        .grid-container { width: 100%; overflow-x: auto; background: #f9f9f9; border-radius: 15px; padding: 15px; margin-top: 10px; }
        .table-grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 85px); gap: 12px; min-width: 550px; }
        .table-item { border-radius: 10px; color: white; font-weight: bold; font-size: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .available { background-color: #9e9e9e; }
        .occupied { background-color: #4caf50; }
        .half-occupied { background: linear-gradient(90deg, #9e9e9e 50%, #4caf50 50%); }

        .footer { margin-top: 20px; font-size: 12px; color: #8e8e93; }
        .live-tag { font-size: 10px; background: #ff3b30; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="images/cat-left.jpg" class="deco-img">
            <div>
                <h1>店內即時座位 <span class="live-tag">LIVE</span></h1>
                <div id="main-status" class="status-badge available-status">讀取中...</div>
            </div>
            <img src="images/cat-right.jpg" class="deco-img">
        </div>

        <div class="legend">
            <div class="legend-item"><div class="box available"></div> 灰色：空位</div>
            <div class="legend-item"><div class="box occupied"></div> 綠色：使用中</div>
            <div class="legend-item"><div class="box half"></div> 灰綠：可併桌 (僅方桌/藤桌)</div>
        </div>

        <div class="grid-container">
            <div class="table-grid" id="tables"></div>
        </div>

        <div class="footer">
            <div id="update-time">最後同步時間：載入中...</div>
            <div style="margin-top: 5px; opacity: 0.6;">(系統每 15 秒自動刷新，無需手動操作)</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://malishome-seats-hq.loca.lt/api/seats';
        const GITHUB_DATA_URL = 'https://raw.githubusercontent.com/malishome/posky-seats/main/seatData.json';

        function render(data) {
            if (!data || !data.details) return;
            const statusBadge = document.getElementById('main-status');
            statusBadge.innerText = data.availableTables > 0 ? `尚有空位 (${data.availableTables} 桌)` : '目前客滿';
            statusBadge.className = 'status-badge ' + (data.availableTables > 0 ? 'available-status' : 'full-status');

            const grid = document.getElementById('tables');
            grid.innerHTML = '';
            
            // 排序
            const sorted = data.details.sort((a,b) => (a.row - b.row) || (a.col - b.col));
            
            sorted.forEach(t => {
                const div = document.createElement('div');
                div.className = `table-item ${t.status}`;
                div.innerHTML = `<span>${t.name}</span>`;
                if (t.row) {
                    div.style.gridRow = t.row;
                    div.style.gridColumn = t.col;
                }
                grid.appendChild(div);
            });
            document.getElementById('update-time').innerText = `最後同步時間：${data.lastUpdated}`;
        }

        async function refresh() {
            try {
                // 優先嘗試直連主機 API (達成 15 秒同步)
                const res = await fetch(`${API_URL}?t=${Date.now()}`, { 
                    headers: { 'Bypass-Tunnel-Reminder': 'true' },
                    cache: 'no-store'
                });
                const data = await res.json();
                render(data);
            } catch (e) {
                // 如果 API 失敗，回退到 GitHub (約 1 分鐘延遲)
                try {
                    const res = await fetch(`${GITHUB_DATA_URL}?t=${Date.now()}`, { cache: 'no-store' });
                    const data = await res.json();
                    render(data);
                } catch (err) {}
            }
        }

        refresh();
        setInterval(refresh, 15000); // 15秒自動刷新
    </script>
</body>
</html>
